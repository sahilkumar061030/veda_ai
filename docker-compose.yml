version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: vedaai-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vedaai
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vedaai-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
